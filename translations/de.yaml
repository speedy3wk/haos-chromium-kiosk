configuration:
  ha_url:
    name: HA URL
    description: Basis-URL fuer Home Assistant
  ha_dashboard:
    name: HA Dashboard
    description: Optionaler Dashboard-Pfad (z.B. dashboard-player)
  ha_username:
    name: HA Benutzername
    description: Home Assistant Benutzername fuer Auto-Login
  ha_password:
    name: HA Passwort
    description: Home Assistant Passwort fuer Auto-Login
  dark_mode:
    name: Dark Mode
    description: Erzwingt Dark Mode in Chromium
  ha_theme:
    name: HA Theme
    description: Home Assistant Theme-Name (optional)
  ha_sidebar:
    name: HA Sidebar
    description: "Sidebar-Sichtbarkeit: full | narrow | none (ausgeblendet) | auto"
  hide_header:
    name: Header ausblenden
    description: Home Assistant Header ausblenden
  resolution_width:
    name: Aufloesung Breite
    description: Display-Breite erzwingen (0 = auto)
  resolution_height:
    name: Aufloesung Hoehe
    description: Display-Hoehe erzwingen (0 = auto)
  refresh_rate:
    name: Bildwiederholrate
    description: Display-Refresh erzwingen (0 = auto, Dezimalwerte wie 59.94 moeglich)
  video_profile_preset:
    name: Video Profil Preset
    description: "Hauptschalter: passthrough (Standard, keine Aenderungen) | sdr_rgb_limited (TV / Limited Range) | sdr_bt709_ycc | hdr_bt2020_ycc | custom (erweiterte Optionen nutzen)"
  software_rendering:
    name: Software Rendering
    description: Deaktiviert Chromium GPU-Beschleunigung (SwiftShader CPU-Fallback). Nur aktivieren bei Black-Screen-Problemen mit Hardware-Rendering.
  hdr_mode:
    name: Advanced HDR Modus
    description: "Nur bei preset=custom. Benoetigt HDR-faehiges Display und Treiber-Unterstuetzung (nicht verfuegbar auf Intel i915). auto | off | on"
  color_space:
    name: Advanced Farbraum
    description: "Nur bei preset=custom. Farbraum-Hinweis an den Treiber. rgb/yuv-Modi benoetigen GPU-Unterstuetzung (AMD amdgpu, diskrete GPUs). Intel i915: nur rgb/auto zuverlaessig. auto | rgb | yuv444 | yuv422 | yuv420"
  color_profile:
    name: Advanced Farbprofil
    description: "Nur bei preset=custom. Ueberschreibt color_space wenn gesetzt. Farbprofile (BT.709, BT.2020, DCI-P3 etc.) erfordern Treiber-Unterstuetzung — AMD amdgpu und diskrete GPUs. Intel i915: auto verwenden."
  rgb_range:
    name: Advanced RGB Bereich
    description: "Nur bei preset=custom und RGB-Pfad. Steuert Broadcast RGB (full vs. limited 16-235). Funktioniert auf den meisten GPUs inkl. Intel. auto | full | limited"
  force_output_on:
    name: Ausgang erzwingen
    description: Versucht den Ausgang aktiv zu halten (Software-EDID-Ghost)
  login_delay:
    name: Login Delay
    description: Sekunden bis zum Auto-Login-Versuch
  browser_refresh:
    name: Browser Refresh
    description: Sekunden zwischen Refreshes (0 = aus)
  browser_mod_id:
    name: Browser Mod ID
    description: Wert fuer browser_mod-browser-id
  clear_chromium_on_start:
    name: Chromium beim Start zuruecksetzen
    description: Chromium-Profil beim Start zuruecksetzen
  zoom_level:
    name: Zoom Level
    description: 100 = normal
  screen_timeout:
    name: Screen Timeout
    description: Sekunden bis Bildschirm aus (0 = nie)
  rotate_display:
    name: Anzeige drehen
    description: normal | left | right | inverted
  audio_sink:
    name: Audio-Ausgabe
    description: auto | hdmi | usb | none
  hide_cursor:
    name: Cursor ausblenden
    description: Mauszeiger ausblenden
  debug_logging:
    name: Debug-Logging
    description: Ausfuehrliche Debug-Ausgaben im Add-on-Log aktivieren
