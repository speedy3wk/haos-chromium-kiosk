configuration:
  ha_url:
    name: HA URL
    description: Base URL for Home Assistant
  ha_dashboard:
    name: HA Dashboard
    description: Optional dashboard path (e.g. dashboard-player)
  ha_username:
    name: HA Username
    description: Home Assistant username for auto-login
  ha_password:
    name: HA Password
    description: Home Assistant password for auto-login
  dark_mode:
    name: Dark Mode
    description: Force Chromium dark mode
  ha_theme:
    name: HA Theme
    description: Home Assistant theme name (optional)
  ha_sidebar:
    name: HA Sidebar
    description: "Controls sidebar visibility: full | narrow | none (hidden) | auto"
  hide_header:
    name: Hide Header
    description: Hide Home Assistant header
  resolution_width:
    name: Resolution Width
    description: Force display width (0 = auto)
  resolution_height:
    name: Resolution Height
    description: Force display height (0 = auto)
  refresh_rate:
    name: Refresh Rate
    description: Force display refresh rate (0 = auto, decimals like 59.94 supported)
  video_profile_preset:
    name: Video Profile Preset
    description: "Main switch: passthrough (default, no changes) | sdr_rgb_limited (TV/limited-range) | sdr_bt709_ycc | hdr_bt2020_ycc | custom (use advanced options below)"
  software_rendering:
    name: Software Rendering
    description: Disable Chromium GPU acceleration (SwiftShader CPU fallback). Only enable if you see a black screen with hardware rendering.
  hdr_mode:
    name: Advanced HDR Mode
    description: "preset=custom only. Requires HDR-capable display and GPU driver support (not available on Intel i915). auto | off | on"
  color_space:
    name: Advanced Color Space
    description: "preset=custom only. auto = let driver decide. rgb = force RGB output + Broadcast RGB range. yuv = best available YCC profile. Explicit profiles (bt709, bt2020_ycc, bt2020_rgb, oprgb, dci_p3_d65 ...): set exact xrandr colorspace. Colorspace properties require AMD/Nvidia. Intel i915: only auto/rgb reliably works."
  rgb_range:
    name: Advanced RGB Range
    description: "preset=custom only, RGB path only. Controls Broadcast RGB (full vs. limited 16-235). Works on most GPUs incl. Intel. auto | full | limited"
  force_output_on:
    name: Force Output On
    description: Try to keep output active (software EDID ghost style)
  login_delay:
    name: Login Delay
    description: Seconds before auto-login attempt
  browser_refresh:
    name: Browser Refresh
    description: Seconds between refreshes (0 = disabled)
  browser_mod_id:
    name: Browser Mod ID
    description: Value for browser_mod-browser-id
  clear_chromium_on_start:
    name: Clear Chromium On Start
    description: Reset Chromium profile on startup
  zoom_level:
    name: Zoom Level
    description: 100 = normal
  screen_timeout:
    name: Screen Timeout
    description: Seconds before screen blank (0 = never)
  rotate_display:
    name: Rotate Display
    description: normal | left | right | inverted
  audio_sink:
    name: Audio Sink
    description: auto | hdmi | usb | none
  hide_cursor:
    name: Hide Cursor
    description: Hide the mouse cursor
  debug_logging:
    name: Debug Logging
    description: Enable verbose debug output in the add-on log
